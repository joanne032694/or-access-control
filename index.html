<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="手術室門禁">
<link rel="manifest" href="manifest.json">
<title>恩主公醫院手術室門禁管理系統</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
:root{--c1:#7c3aed;--c1l:#ede9fe;--c2:#db2777;--c2l:#fce7f3;--c3:#059669;--c3l:#d1fae5;--c4:#d97706;--c4l:#fef3c7;--c5:#0284c7;--c5l:#e0f2fe;--bg:#f5f3ff;--white:#fff;--text:#1e1b4b;--text2:#6b7280;--text3:#9ca3af;--border:rgba(0,0,0,0.08);--radius:16px;--rsm:12px;--shadow:0 2px 8px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:24px;font-size:16px}
.app-header{background:linear-gradient(135deg,#7c3aed 0%,#db2777 100%);color:white;padding:16px 16px 12px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(124,58,237,0.3)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:.02em}
.hdr-sub{font-size:11px;opacity:.7;letter-spacing:.07em}
.hdr-right{display:flex;align-items:center;gap:8px}
.spill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 10px;font-size:12px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ade80}
.clock{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.mode-bar{background:rgba(255,255,255,.15);border-radius:10px;padding:6px;display:flex;gap:4px;margin-top:8px}
.mode-btn{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;background:transparent;color:rgba(255,255,255,.7)}
.mode-btn.active{background:white;color:#7c3aed}
.top-nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:8px 12px 0}
.top-nav::-webkit-scrollbar{display:none}
.tnav{flex:1;min-width:62px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 7px;border:none;background:rgba(255,255,255,.12);border-radius:10px;cursor:pointer;color:rgba(255,255,255,.65);font-size:11px;font-family:inherit;font-weight:500;transition:all .18s;white-space:nowrap}
.tnav svg{width:20px;height:20px;stroke-width:2}
.tnav.t-entry.active{background:#7c3aed;color:#fff;box-shadow:0 2px 10px rgba(124,58,237,.6)}
.tnav.t-exit.active{background:#db2777;color:#fff;box-shadow:0 2px 10px rgba(219,39,119,.6)}
.tnav.t-records.active{background:#059669;color:#fff;box-shadow:0 2px 10px rgba(5,150,105,.6)}
.tnav.t-report.active{background:#d97706;color:#fff;box-shadow:0 2px 10px rgba(217,119,6,.6)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 12px 0}
.sc{border-radius:var(--rsm);padding:12px 6px;text-align:center}
.sc1{background:var(--c1l)}.sc2{background:var(--c2l)}.sc3{background:var(--c3l)}.sc4{background:var(--c4l)}
.sn{font-size:26px;font-weight:700;line-height:1}
.sn1{color:var(--c1)}.sn2{color:var(--c2)}.sn3{color:var(--c3)}.sn4{color:var(--c4)}
.sl{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.3}
.panel{display:none;padding:12px}.panel.active{display:block}
.fc{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:.5px solid var(--border);overflow:hidden;margin-bottom:12px}
.ch{padding:12px 16px;font-size:13px;font-weight:700;letter-spacing:.06em}
.chp{background:var(--c1l);color:var(--c1);border-bottom:1px solid rgba(124,58,237,.12)}
.chk{background:var(--c2l);color:var(--c2);border-bottom:1px solid rgba(219,39,119,.12)}
.chg{background:var(--c3l);color:var(--c3);border-bottom:1px solid rgba(5,150,105,.12)}
.chs{background:var(--c5l);color:var(--c5);border-bottom:1px solid rgba(2,132,199,.12)}
.cb{padding:16px}
.notice{background:var(--c5l);border-left:3px solid var(--c5);border-radius:0 var(--rsm) var(--rsm) 0;padding:12px 14px;font-size:14px;color:#075985;margin-bottom:16px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px}
.fg label .req{color:var(--c2);margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid #e5e7eb;border-radius:var(--rsm);background:#fafafa;color:var(--text);font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--c1);background:var(--white);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.fg textarea{min-height:80px;resize:vertical}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cert-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fafafa;border-radius:var(--rsm);margin-bottom:10px;border:2px solid #e5e7eb;transition:all .2s;cursor:pointer}
.cert-opt input[type=radio]{width:20px;height:20px;accent-color:var(--c1);flex-shrink:0}
.cert-opt label{font-size:16px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:500;flex:1}
.cinp{flex:1;padding:10px 12px;font-size:15px;border:1.5px solid #e5e7eb;border-radius:8px;background:var(--white);color:var(--text);font-family:inherit;min-width:0}
.cinp:disabled{background:#f3f4f6;color:var(--text3)}
.cinp:focus{outline:none;border-color:var(--c1)}
.chk-row{display:flex;flex-wrap:wrap;gap:10px}
.ci{display:flex;align-items:center;gap:8px;padding:12px 18px;background:#fafafa;border-radius:var(--rsm);border:2px solid #e5e7eb;cursor:pointer;font-size:15px;color:var(--text);transition:all .2s;font-weight:500}
.ci input[type=checkbox]{width:18px;height:18px;accent-color:var(--c2)}
.ci.checked{background:#db2777;border-color:#db2777;color:#fff;font-weight:700}
.oinp{width:100%;margin-top:10px;padding:10px 14px;font-size:15px;border:1.5px solid #e5e7eb;border-radius:var(--rsm);background:#fafafa;color:var(--text);font-family:inherit}
.oinp:focus{outline:none;border-color:var(--c1)}
.btn-row{display:flex;gap:12px;padding-top:6px}
.btn{flex:1;padding:15px;font-size:16px;font-weight:700;border-radius:var(--rsm);border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.bg{background:#f3f4f6;color:var(--text2)}.bp{background:var(--c1);color:white}.bk{background:var(--c2);color:white}.bgr{background:var(--c3);color:white}.ba{background:var(--c4);color:white}
.exit-item{padding:16px;border-bottom:.5px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;gap:12px}
.exit-item:last-child{border-bottom:none}
.em{font-size:16px;font-weight:600;color:var(--text)}.es{font-size:13px;color:var(--text2);margin-top:4px}
.ebtn{background:var(--c2);color:white;border:none;border-radius:var(--rsm);padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;line-height:1.4;text-align:center}
.ri{padding:14px 16px;border-bottom:.5px solid #f3f4f6}.ri:last-child{border-bottom:none}
.rt{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rn{font-size:15px;font-weight:600}.rm{font-size:13px;color:var(--text2);line-height:1.8}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.bin{background:var(--c3l);color:var(--c3)}.bout{background:#f3f4f6;color:#6b7280}
.bcy{background:var(--c1l);color:var(--c1)}.bcn{background:#fee2e2;color:#dc2626}
.bry{background:var(--c3l);color:var(--c3)}.brn{background:#fee2e2;color:#dc2626}
.rpt-ctrl{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:.5px solid var(--border)}
.rpt-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rpt-row input[type=month]{flex:1;padding:12px 14px;font-size:16px;border:1.5px solid #e5e7eb;border-radius:var(--rsm);background:#fafafa;color:var(--text);font-family:inherit}
.rpt-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.rsc{border-radius:var(--rsm);padding:12px 8px;text-align:center}
.rn2{font-size:22px;font-weight:700}.rl{font-size:11px;color:var(--text2);margin-top:3px}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.emi{font-size:36px;margin-bottom:12px}
.exit-ptag{font-size:15px;font-weight:600;color:var(--c2);padding:12px 14px;background:var(--c2l);border-radius:var(--rsm);margin-bottom:16px}
.ret-row{display:flex;gap:10px;margin-top:6px}
.ropt{display:flex;align-items:center;gap:8px;flex:1;padding:12px 16px;background:#fafafa;border-radius:var(--rsm);border:2px solid #e5e7eb;cursor:pointer;font-size:15px;transition:all .15s;font-weight:500}
.ropt.sel-yes{border-color:#059669;background:#d1fae5;color:#059669;font-weight:700}
.ropt.sel-no{border-color:#dc2626;background:#fee2e2;color:#dc2626;font-weight:700}
.ropt input[type=radio]{width:18px;height:18px;flex-shrink:0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,27,75,.92);color:white;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head>
<body>
<div class="app-header">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">🏥 恩主公醫院手術室門禁管理系統</div>
      <div class="hdr-sub">OPERATION ROOM ACCESS CONTROL · v1</div>
    </div>
    <div class="hdr-right">
      <div class="spill"><div class="sdot"></div><span>正常</span></div>
      <div class="clock" id="clock">00:00:00</div>
    </div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="mode-vendor" onclick="switchMode('vendor')">🏢 廠商填寫</button>
    <button class="mode-btn" id="mode-nurse" onclick="switchMode('nurse')">👩‍⚕️ 護理人員</button>
  </div>
</div>

<div id="vendor-mode">
  <div style="padding:12px">
    <div class="fc"><div class="ch chp">📅 進場資訊</div><div class="cb">
      <div class="notice">廠商請填寫以下資料，填完後交給護理人員確認。</div>
      <div class="fr2">
        <div class="fg"><label>進場日期<span class="req">*</span></label><input type="date" id="f-date"></div>
        <div class="fg"><label>進場時間<span class="req">*</span></label><input type="time" id="f-time"></div>
      </div>
    </div></div>
    <div class="fc"><div class="ch chk">🏢 廠商資料</div><div class="cb">
      <div class="fr2">
        <div class="fg"><label>公司名稱<span class="req">*</span></label><input type="text" id="f-company" placeholder="公司全名"></div>
        <div class="fg"><label>廠牌<span class="req">*</span></label><input type="text" id="f-brand" placeholder="產品廠牌"></div>
      </div>
      <div class="fr2">
        <div class="fg"><label>姓名<span class="req">*</span></label><input type="text" id="f-name" placeholder="姓名"></div>
        <div class="fg"><label>聯絡電話<span class="req">*</span></label><input type="tel" id="f-phone" placeholder="電話號碼"></div>
      </div>
      <div class="fg">
        <label>取得台灣手術全期護理學會醫療器材專業人員手術病人安全研習會證照<span class="req">*</span></label>
        <div class="cert-opt" id="cert-opt-yes">
          <input type="radio" name="cert" id="cert-yes" value="是" onchange="toggleCert()">
          <label for="cert-yes">✅ 是　卡號</label>
          <input type="text" class="cinp" id="cert-card" placeholder="請輸入卡號" disabled>
        </div>
        <div class="cert-opt" id="cert-opt-no">
          <input type="radio" name="cert" id="cert-no" value="否" onchange="toggleCert()">
          <label for="cert-no">❌ 否</label>
        </div>
      </div>
      <div class="fg">
        <label>交換證件<span class="req">*</span></label>
        <div class="chk-row" id="id-checks">
          <label class="ci" id="lbl-id"><input type="checkbox" value="身分證" onchange="updChk(this,'lbl-id')"> 身分證</label>
          <label class="ci" id="lbl-hc"><input type="checkbox" value="健保卡" onchange="updChk(this,'lbl-hc')"> 健保卡</label>
          <label class="ci" id="lbl-other"><input type="checkbox" value="其他" id="chk-other" onchange="togOther(this,'lbl-other')"> 其他</label>
        </div>
        <input type="text" class="oinp" id="other-text" placeholder="請說明其他證件" style="display:none">
      </div>
      <div class="fg">
        <label>跟刀科別<span class="req">*</span></label>
        <select id="f-dept"><option value="">選擇科別</option><option>心臟外科</option><option>神經外科</option><option>骨科</option><option>泌尿科</option><option>婦產科</option><option>一般外科</option><option>胸腔外科</option><option>整形外科</option><option>耳鼻喉科</option><option>眼科</option></select>
      </div>其他</option><option>
      <div class="fr2">
        <div class="fg"><label>主刀醫師<span class="req">*</span></label><input type="text" id="f-doctor" placeholder="醫師姓名"></div>
        <div class="fg"><label>手術術式<span class="req">*</span></label><input type="text" id="f-surgery" placeholder="術式名稱"></div>
      </div>
      <div style="background:#fef3c7;border-left:3px solid #d97706;border-radius:0 10px 10px 0;padding:12px 14px;font-size:14px;color:#92400e;margin-top:4px">
        填完後請交給護理人員繼續操作 👇
      </div>
    </div></div>
  </div>
</div>

<div id="nurse-mode" style="display:none">
  <div class="stats-row">
    <div class="sc sc1"><div class="sn sn1" id="s-total">0</div><div class="sl">今日進場</div></div>
    <div class="sc sc2"><div class="sn sn2" id="s-inside">0</div><div class="sl">目前在場</div></div>
    <div class="sc sc3"><div class="sn sn3" id="s-pending">0</div><div class="sl">待換證</div></div>
    <div class="sc sc4"><div class="sn sn4" id="s-left">0</div><div class="sl">已離場</div></div>
  </div>
  <div class="top-nav">
    <button class="tnav t-entry active" onclick="showPanel('entry')" id="nav-entry"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M10 14L21 3M9 21H3v-6"/></svg>完成登記</button>
    <button class="tnav t-exit" onclick="showPanel('exit')" id="nav-exit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H3v-6M15 10l-11 11M15 3h6v6"/></svg>離場換證</button>
    <button class="tnav t-records" onclick="showPanel('records')" id="nav-records"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>進出紀錄</button>
    <button class="tnav t-report" onclick="showPanel('report')" id="nav-report"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>月報表</button>
  </div>
  <div id="panel-entry" class="panel active" style="padding:12px">
    <div class="fc"><div class="ch chg">✍️ 護理人員填寫</div><div class="cb">
      <div class="notice">請核對廠商資料後，填寫以下資訊完成登記。</div>
      <div class="fr2">
        <div class="fg"><label>換證識別證號<span class="req">*</span></label><input type="text" id="f-badge" placeholder="識別證號碼"></div>
        <div class="fg"><label>手術室人員簽名<span class="req">*</span></label><input type="text" id="f-recorder" placeholder="簽名（員編）"></div>
      </div>
      <div class="fg"><label>備註</label><textarea id="f-note" placeholder="選填備註事項..."></textarea></div>
      <div class="btn-row">
        <button class="btn bg" onclick="clearNurseForm()">清除</button>
        <button class="btn bp" onclick="submitEntry()">✅ 確認進場登記</button>
      </div>
    </div></div>
  </div>
  <div id="panel-exit" class="panel" style="padding:12px">
    <div class="fc"><div class="ch chk">🚪 待離場人員</div><div id="exit-list"><div class="empty"><div class="emi">✅</div>目前無待離場人員</div></div></div>
    <div class="fc" id="exit-form-card" style="display:none"><div class="ch chk">📝 離場確認</div><div class="cb">
      <div class="exit-ptag" id="exit-form-person"></div>
      <div class="fg"><label>是否歸還識別證<span class="req">*</span></label>
        <div class="ret-row">
          <label class="ropt" id="ropt-yes" onclick="selRet('yes')"><input type="radio" name="ret-badge" value="是"> ✅ 是，已歸還</label>
          <label class="ropt" id="ropt-no" onclick="selRet('no')"><input type="radio" name="ret-badge" value="否"> ❌ 否，未歸還</label>
        </div>
      </div>
      <div class="fr2">
        <div class="fg"><label>離開時間<span class="req">*</span></label><input type="time" id="exit-time"></div>
        <div class="fg"><label>手術室人員簽名<span class="req">*</span></label><input type="text" id="exit-signer" placeholder="簽名（原編）"></div>
      </div>
      <div class="btn-row">
        <button class="btn bg" onclick="cancelExit()">取消</button>
        <button class="btn bk" onclick="confirmExit()">✅ 確認離場完成</button>
      </div>
    </div></div>
  </div>
  <div id="panel-records" class="panel" style="padding:12px">
    <div class="fc"><div class="ch chg">📋 進出紀錄</div><div id="record-list"><div class="empty"><div class="emi">📋</div>載入中...</div></div></div>
  </div>
  <div id="panel-report" class="panel" style="padding:12px">
    <div class="rpt-ctrl">
      <div class="rpt-row"><input type="month" id="rpt-month"><button class="btn ba" style="flex:none;padding:12px 18px;font-size:15px" onclick="genReport()">產生報表</button></div>
      <div class="btn-row"><button class="btn bgr" onclick="exportCSV()">📥 匯出 CSV</button></div>
    </div>
    <div id="rpt-summary" style="display:none" class="rpt-summary">
      <div class="rsc sc1"><div class="rn2 sn1" id="rpt-total">0</div><div class="rl">進場總次</div></div>
      <div class="rsc sc3"><div class="rn2 sn3" id="rpt-cert">0</div><div class="rl">持證人員</div></div>
      <div class="rsc" style="background:#fee2e2"><div class="rn2" style="color:#dc2626" id="rpt-nocert">0</div><div class="rl">未持證</div></div>
    </div>
    <div class="fc"><div id="rpt-list"><div class="empty"><div class="emi">📊</div>請選擇月份並產生報表</div></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var db;
firebase.initializeApp({
  apiKey:"AIzaSyAX2qgrC7ZL5cjrsJYvOJcVkKHcWsWouqc",
  authDomain:"or-access-control-system.firebaseapp.com",
  projectId:"or-access-control-system",
  storageBucket:"or-access-control-system.firebasestorage.app",
  messagingSenderId:"534273733946",
  appId:"1:534273733946:web:698d5a63da409d637fcc03"
});
db=firebase.firestore();

var records=[];
var currentMode='vendor';
var exitId=null;
var today=new Date().toISOString().split('T')[0];

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false});}
updateClock();setInterval(updateClock,1000);
document.getElementById('f-date').value=today;
document.getElementById('f-time').value=new Date().toTimeString().slice(0,5);
document.getElementById('rpt-month').value=today.slice(0,7);

db.collection('records').orderBy('createdAt','desc').onSnapshot(function(snapshot){
  records=snapshot.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  updateStats();
  if(currentMode==='nurse'){renderExitList();renderRecords();}
});

function switchMode(mode){
  if(mode==='nurse'){
    var pwd=prompt('請輸入護理人員密碼：');
    if(pwd===null)return;
    if(pwd!=='A030'){alert('❌ 密碼錯誤，無法進入護理人員模式');return;}
  }
  currentMode=mode;
  document.getElementById('vendor-mode').style.display=mode==='vendor'?'block':'none';
  document.getElementById('nurse-mode').style.display=mode==='nurse'?'block':'none';
  document.getElementById('mode-vendor').classList.toggle('active',mode==='vendor');
  document.getElementById('mode-nurse').classList.toggle('active',mode==='nurse');
  if(mode==='nurse'){renderExitList();renderRecords();}
}

function showPanel(name){
  ['entry','exit','records','report'].forEach(function(p){
    document.getElementById('panel-'+p).classList.remove('active');
    document.getElementById('nav-'+p).classList.remove('active');
  });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='exit')renderExitList();
  if(name==='records')renderRecords();
  window.scrollTo(0,0);
}

function updateStats(){
  var tr=records.filter(function(r){return r.date===today;});
  document.getElementById('s-total').textContent=tr.length;
  document.getElementById('s-inside').textContent=tr.filter(function(r){return r.status==='in';}).length;
  document.getElementById('s-pending').textContent=tr.filter(function(r){return r.status==='in';}).length;
  document.getElementById('s-left').textContent=tr.filter(function(r){return r.status==='out';}).length;
}

function toggleCert(){
  var r=document.querySelector('input[name=cert]:checked');
  var c=document.getElementById('cert-card');
  var y=r&&r.value==='是';
  c.disabled=!y;c.style.opacity=y?'1':'0.5';
  if(!y)c.value='';
  var optYes=document.getElementById('cert-opt-yes');
  var optNo=document.getElementById('cert-opt-no');
  if(y){
    optYes.style.background='#7c3aed';optYes.style.borderColor='#7c3aed';
    optYes.querySelector('label').style.color='white';
    optNo.style.background='#fafafa';optNo.style.borderColor='#e5e7eb';
    optNo.querySelector('label').style.color='';
  } else if(r){
    optNo.style.background='#db2777';optNo.style.borderColor='#db2777';
    optNo.querySelector('label').style.color='white';
    optYes.style.background='#fafafa';optYes.style.borderColor='#e5e7eb';
    optYes.querySelector('label').style.color='';
  }
}

function updChk(el,id){document.getElementById(id).classList.toggle('checked',el.checked);}
function togOther(el,id){
  document.getElementById(id).classList.toggle('checked',el.checked);
  document.getElementById('other-text').style.display=el.checked?'block':'none';
}
function getIdChecked(){
  var v=[];
  document.querySelectorAll('#id-checks input[type=checkbox]').forEach(function(c){
    if(c.checked){if(c.value==='其他'){var t=document.getElementById('other-text').value.trim();v.push(t?'其他:'+t:'其他');}else v.push(c.value);}
  });
  return v.join('、');
}
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function selRet(which){
  document.querySelector('input[name=ret-badge][value="'+(which==='yes'?'是':'否')+'"]').checked=true;
  document.getElementById('ropt-yes').className='ropt'+(which==='yes'?' sel-yes':'');
  document.getElementById('ropt-no').className='ropt'+(which==='no'?' sel-no':'');
}

function submitEntry(){
  var req=['f-date','f-time','f-company','f-brand','f-name','f-phone','f-dept','f-doctor','f-surgery','f-badge','f-recorder'];
  var v={};
  for(var i=0;i<req.length;i++){
    var x=document.getElementById(req[i]).value.trim();
    if(!x){document.getElementById(req[i]).focus();toast('請填寫所有必填欄位');return;}
    v[req[i]]=x;
  }
  var cert=(document.querySelector('input[name=cert]:checked')||{}).value||'';
  if(!cert){toast('請選擇是否取得證照');return;}
  var certCard=cert==='是'?document.getElementById('cert-card').value.trim():'';
  if(cert==='是'&&!certCard){document.getElementById('cert-card').focus();toast('請輸入證照卡號');return;}
  var idDoc=getIdChecked();if(!idDoc){toast('請選擇交換證件');return;}
  var data={date:v['f-date'],time:v['f-time'],company:v['f-company'],brand:v['f-brand'],name:v['f-name'],phone:v['f-phone'],cert:cert,certCard:certCard,idDoc:idDoc,dept:v['f-dept'],doctor:v['f-doctor'],surgery:v['f-surgery'],badge:v['f-badge'],recorder:v['f-recorder'],note:document.getElementById('f-note').value,status:'in',createdAt:Date.now()};
  db.collection('records').add(data)
    .then(function(){toast('✅ 進場登記完成（已同步雲端）');clearVendorForm();clearNurseForm();})
    .catch(function(){toast('❌ 儲存失敗，請重試');});
}

function clearVendorForm(){
  ['f-company','f-brand','f-name','f-phone','cert-card','f-dept','f-doctor','f-surgery'].forEach(function(id){document.getElementById(id).value='';});
  document.querySelectorAll('input[name=cert]').forEach(function(r){r.checked=false;});
  document.querySelectorAll('#id-checks input[type=checkbox]').forEach(function(c){c.checked=false;});
  ['lbl-id','lbl-hc','lbl-other'].forEach(function(id){document.getElementById(id).classList.remove('checked');});
  document.getElementById('other-text').style.display='none';document.getElementById('other-text').value='';
  document.getElementById('cert-card').disabled=true;document.getElementById('cert-card').style.opacity='0.5';
  document.getElementById('cert-opt-yes').removeAttribute('style');document.getElementById('cert-opt-no').removeAttribute('style');
  document.getElementById('cert-opt-yes').querySelector('label').style.color='';
  document.getElementById('cert-opt-no').querySelector('label').style.color='';
  document.getElementById('f-date').value=today;
  document.getElementById('f-time').value=new Date().toTimeString().slice(0,5);
}

function clearNurseForm(){
  ['f-badge','f-recorder','f-note'].forEach(function(id){document.getElementById(id).value='';});
}

function renderExitList(){
  var inside=records.filter(function(r){return r.status==='in';});
  var el=document.getElementById('exit-list');
  document.getElementById('exit-form-card').style.display='none';
  if(!inside.length){el.innerHTML='<div class="empty"><div class="emi">✅</div>目前無待離場人員</div>';return;}
  el.innerHTML=inside.map(function(r){return '<div class="exit-item"><div><div class="em">'+r.company+'（'+r.brand+'）· '+r.name+'</div><div class="es">'+(r.dept||'')+' · '+(r.doctor||'')+' · 進場 '+r.time+' · 識別證 '+(r.badge||'')+'</div></div><button class="ebtn" onclick="openExitForm(\''+r.id+'\')">離場<br>換證</button></div>';}).join('');
}

function openExitForm(id){
  exitId=id;var r=records.find(function(x){return x.id===id;});
  document.getElementById('exit-form-person').textContent=r.company+'（'+r.brand+'）· '+r.name+' · '+(r.dept||'');
  document.getElementById('exit-time').value=new Date().toTimeString().slice(0,5);
  document.getElementById('exit-signer').value='';
  document.querySelectorAll('input[name=ret-badge]').forEach(function(x){x.checked=false;});
  document.getElementById('ropt-yes').className='ropt';
  document.getElementById('ropt-no').className='ropt';
  document.getElementById('exit-form-card').style.display='block';
  document.getElementById('exit-form-card').scrollIntoView({behavior:'smooth',block:'start'});
}
function cancelExit(){exitId=null;document.getElementById('exit-form-card').style.display='none';}
function confirmExit(){
  var ret=(document.querySelector('input[name=ret-badge]:checked')||{}).value||'';
  if(!ret){toast('請選擇是否歸還識別證');return;}
  var et=document.getElementById('exit-time').value;if(!et){toast('請填寫離開時間');return;}
  var sg=document.getElementById('exit-signer').value.trim();if(!sg){toast('請填寫手術室人員簽名');return;}
  db.collection('records').doc(exitId).update({status:'out',exitTime:et,retBadge:ret,exitSigner:sg})
    .then(function(){exitId=null;toast('✅ 離場換證完成');})
    .catch(function(){toast('❌ 更新失敗');});
}

function renderRecords(){
  var el=document.getElementById('record-list');
  if(!records.length){el.innerHTML='<div class="empty"><div class="emi">📋</div>尚無進出紀錄</div>';return;}
  el.innerHTML=records.map(function(r){return '<div class="ri"><div class="rt"><div class="rn">'+r.company+'・'+r.name+'</div><span class="badge '+(r.status==='in'?'bin':'bout')+'">'+(r.status==='in'?'在場中':'已離場')+'</span></div><div class="rm">'+r.brand+' ／ '+(r.dept||'')+' ／ '+(r.doctor||'')+'<br>進場 '+r.date+' '+r.time+(r.exitTime?' ／ 離場 '+r.exitTime:'')+'<br>識別證：'+(r.badge||'')+'　<span class="badge '+(r.retBadge==='是'?'bry':'brn')+'">'+(r.retBadge?'歸還：'+r.retBadge:'未離場')+'</span><br>交換：'+r.idDoc+'<br><span class="badge '+(r.cert==='是'?'bcy':'bcn')+'">'+(r.cert==='是'?'持證 #'+r.certCard:'未持證')+'</span><br>進場簽名：'+(r.recorder||'')+(r.exitSigner?' ／ 離場簽名：'+r.exitSigner:'')+'</div></div>';}).join('');
}

function genReport(){
  var month=document.getElementById('rpt-month').value;if(!month)return;
  var f=records.filter(function(r){return r.date.startsWith(month);});
  var cy=f.filter(function(r){return r.cert==='是';}).length;
  document.getElementById('rpt-total').textContent=f.length;
  document.getElementById('rpt-cert').textContent=cy;
  document.getElementById('rpt-nocert').textContent=f.length-cy;
  document.getElementById('rpt-summary').style.display='grid';
  var el=document.getElementById('rpt-list');
  if(!f.length){el.innerHTML='<div class="empty"><div class="emi">📊</div>該月份無進出紀錄</div>';return;}
  el.innerHTML=f.map(function(r){return '<div class="ri"><div class="rt"><div class="rn">'+r.company+'・'+r.name+'</div><span class="badge '+(r.status==='in'?'bin':'bout')+'">'+(r.status==='in'?'在場中':'已離場')+'</span></div><div class="rm">'+r.brand+' ／ '+(r.dept||'')+' ／ '+(r.doctor||'')+' ／ '+(r.surgery||'')+'<br>'+r.date+' 進場 '+r.time+(r.exitTime?' ／ 離場 '+r.exitTime:'')+'<br>識別證：'+(r.badge||'')+'　<span class="badge '+(r.retBadge==='是'?'bry':'brn')+'">'+(r.retBadge?'歸還：'+r.retBadge:'-')+'</span><br>交換：'+r.idDoc+'<br><span class="badge '+(r.cert==='是'?'bcy':'bcn')+'">'+(r.cert==='是'?'持證 #'+r.certCard:'未持證')+'</span><br>進場簽名：'+(r.recorder||'')+(r.exitSigner?' ／ 離場簽名：'+r.exitSigner:'')+(r.note?' ／ 備註：'+r.note:'')+'</div></div>';}).join('');
}

function exportCSV(){
  var month=document.getElementById('rpt-month').value;
  var f=records.filter(function(r){return r.date.startsWith(month);});
  if(!f.length){toast('該月份無資料可匯出');return;}
  var h=['日期','進場時間','離場時間','公司名稱','廠牌','姓名','聯絡電話','跟刀科別','主刀醫師','手術術式','識別證號','是否歸還識別證','交換證件','持有證照','證照卡號','進場手術室人員簽名','離場手術室人員簽名','備註','狀態'];
  var rows=f.map(function(r){return[r.date,r.time,r.exitTime||'',r.company,r.brand,r.name,r.phone,r.dept||'',r.doctor||'',r.surgery||'',r.badge||'',r.retBadge||'',r.idDoc,r.cert,r.certCard||'',r.recorder||'',r.exitSigner||'',r.note||'',r.status==='in'?'在場中':'已離場'];});
  var csv='\uFEFF'+[h].concat(rows).map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='恩主公醫院手術室門禁管理_'+month+'.csv';a.click();toast('✅ CSV 匯出成功');
}
</script>
</body>
